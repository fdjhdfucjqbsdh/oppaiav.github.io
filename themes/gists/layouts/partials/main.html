<div class="container-xl">
  <div class="d-flex justify-content-center">

    <div class="p-2 pt-0" style="max-width: 800px; width: 100%;">

      {{ if .IsPage }}
        {{ block "post" . }}{{ end }}
      {{ else if or .IsHome (eq .Type "posts") }}
        {{ block "posts" . }}{{ end }}
      {{ end }}

    </div>

  </div>
</div>
